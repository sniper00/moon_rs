name: build
on:
  workflow_dispatch: {}
jobs:
  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-musl
          - build: macos
            os: macos-latest
            rust: nightly
            target: x86_64-apple-darwin
          - build: windows
            os: windows-latest
            rust: nightly-x86_64-msvc
            target: x86_64-pc-windows-msvc
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
          target: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.build == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        run: cargo build --verbose --release --target ${{ matrix.target }}
        env:
          RUST_BACKTRACE: 1
          CC_x86_64_unknown_linux_musl: ${{ matrix.build == 'linux' && 'musl-gcc' || '' }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.build == 'linux' && 'musl-gcc' || '' }}

      - name: Strip binary (linux and macos)
        if: matrix.build == 'linux' || matrix.build == 'macos'
        run: strip "target/${{ matrix.target }}/release/moon_rs"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p "moon_rs-${{ matrix.build }}"
          cp README.md "moon_rs-${{ matrix.build }}/"
          cp -r lualib "moon_rs-${{ matrix.build }}/"
          cp -r assets "moon_rs-${{ matrix.build }}/"
          if [ "${{ matrix.build }}" = "windows" ]; then
            cp "target/${{ matrix.target }}/release/moon_rs.exe" "moon_rs-${{ matrix.build }}/"
          else
            cp "target/${{ matrix.target }}/release/moon_rs" "moon_rs-${{ matrix.build }}/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: moon_rs-${{ matrix.build }}
          path: moon_rs-${{ matrix.build }}/

